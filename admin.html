<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Stella Martis Telemetry</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&family=Oswald:wght@400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="admin.css">
</head>
<body class="admin-body">

  <!-- Background Space Canvas / Telemetry overlay -->
  <div class="bg-image"></div>
  <div class="telemetry-grid-overlay"></div>

  <!-- Header -->
  <header class="header admin-header">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <span class="logo-text">STELLA MARTIS<br><small>ADMIN TELEMETRY CONTROL</small></span>
      </a>
      <div class="header-actions" id="auth-header-actions" style="display: none;">
        <span class="admin-user-badge" id="admin-user-email">admin@stellamartis.in</span>
        <button class="btn btn-secondary btn-sm" id="btn-logout">SIGN OUT</button>
      </div>
      <div class="header-actions">
        <button class="btn btn-secondary btn-sm" id="btn-settings-toggle">DB CONFIG</button>
      </div>
    </div>
  </header>

  <!-- MAIN WRAPPER -->
  <main class="content-wrapper admin-container">

    <!-- 1. LOGIN SCREEN -->
    <section class="auth-section" id="auth-panel">
      <div class="login-card reveal slide-up visible">
        <div class="mission-badge">SECURE CONSOLE</div>
        <h2>ADMINISTRATOR LOGIN</h2>
        <div class="divider"></div>
        <p class="login-intro">Enter credentials to establish qualification database telemetry link.</p>
        
        <form id="login-form">
          <div class="form-group">
            <label>ADMIN EMAIL</label>
            <input type="email" id="login-email" placeholder="email@stellamartis.in" required>
          </div>
          <div class="form-group">
            <label>PASSWORD</label>
            <input type="password" id="login-password" placeholder="••••••••" required>
          </div>
          <div id="login-error-msg" style="color:var(--error); font-family:var(--font-mono); font-size:0.8rem; margin-top:1rem; text-align:center; display:none;"></div>
          <button type="submit" class="btn btn-primary btn-block" id="btn-login-submit">ESTABLISH LINK</button>
